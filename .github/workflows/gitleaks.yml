name: Gitleaks

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly full-history scan
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
